<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0" />
  <title>AR Card</title>
  <style>
    body{margin:0;overflow:hidden;font-family:sans-serif}
    #info{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(0,0,0,.7);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;pointer-events:none}
    #btns{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:10px;align-items:center}
    #btns button{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer}
    #btns button.on{background:rgba(74,222,128,.25);border-color:#4ade80;color:#4ade80}
    #fu{display:none}
  </style>
</head>
<body>

  <!-- A-Frame v1.2.0: jsdelivr npm 官方包 -->
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.2.0/dist/aframe.min.js"></script>
  <!-- AR.js v2.0.8: 仓库本地文件 -->
  <script src="https://cdn.jsdelivr.net/gh/cijiutu/ar-card-scanner@main/aframe-ar.js"></script>

  <div id="info">📷 对准 Hiro 标记</div>

  <div id="btns">
    <button id="upbtn" onclick="document.getElementById('fu').click()">🖼️ 上传立绘</button>
    <input type="file" id="fu" accept="image/*" />
    <span style="font-size:11px;color:rgba(255,255,255,.5)">← 打印或用另一台手机显示标记</span>
  </div>

  <a-scene
    arjs="sourceType: webcam; debugUIEnabled: true; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    vr-mode-ui="enabled: false"
    embedded>

    <a-marker preset="hiro">
      <a-plane position="0 0.005 0" rotation="-90 0 0" width="0.7" height="0.25"
               material="color: #000; opacity: 0.25;"></a-plane>
      <a-plane position="0 0.4 -0.015" width="0.6" height="0.85"
               material="color: #1a1a2e;"></a-plane>
      <a-plane id="card" position="0 0.4 0" width="0.6" height="0.85"
               material="src: https://picsum.photos/id/237/400/566;"></a-plane>
      <a-plane position="0 0.4 0.005" width="0.62" height="0.87"
               material="color: #c9a96e; opacity: 0.35;"></a-plane>
      <a-box position="0 0.03 0.12" width="0.56" height="0.06" depth="0.04"
             material="color: #c9a96e;"></a-box>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    var info = document.getElementById("info");
    var upbtn = document.getElementById("upbtn");
    var fu = document.getElementById("fu");
    var card = document.getElementById("card");
    var blobUrl = null;

    var marker = document.querySelector("a-marker");
    if (marker) {
      marker.addEventListener("markerFound", function() {
        info.innerHTML = "✅ 已识别 Hiro";
        info.style.color = "#4ade80";
      });
      marker.addEventListener("markerLost", function() {
        info.innerHTML = "📷 对准 Hiro 标记";
        info.style.color = "#fff";
      });
    }

    fu.addEventListener("change", function(e) {
      var f = e.target.files[0];
      if (!f || !f.type.startsWith("image/")) return;
      if (blobUrl) URL.revokeObjectURL(blobUrl);
      blobUrl = URL.createObjectURL(f);
      card.setAttribute("material", "src: " + blobUrl);
      upbtn.classList.add("on");
      upbtn.textContent = "✅ 已更换立绘";
    });
  </script>

</body>
</html>
